name: Morning LINE stock digest

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "public/**"
  schedule:
    # GitHub cron uses UTC. 00:00 UTC is 08:00 in Asia/Taipei.
    - cron: "0 0 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Send LINE digest
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_MONTHLY_DISPLAY_LIMIT: "200"
          LINE_STOP_AT: "198"
          LINE_USE_RAW_GITHUB_IMAGE_URL: "true"
          COMMIT_GENERATED_IMAGE: "true"
        run: python scripts/morning_line_digest.py
